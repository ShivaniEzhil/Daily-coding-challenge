<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Coding Challenge</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <span class="date" id="challenge-date">Loading...</span>
                <span class="difficulty" id="challenge-difficulty">---</span>
            </div>
            <h1 id="challenge-title">Fetching today's challenge...</h1>
            <p class="description" id="challenge-description">
                Please wait while we load your daily programming task.
            </p>
            <a href="#" class="btn" id="solve-btn">Solve Challenge</a>
        </div>
        <div class="footer">
            New challenge every 24 hours. Keep coding!
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
